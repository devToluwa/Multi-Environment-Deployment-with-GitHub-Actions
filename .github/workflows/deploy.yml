name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Debug inputs
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Image tag: ${{ inputs.image_tag }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
          --task-definition multi-env-deploy-${{ inputs.environment }} \
          --query taskDefinition \
          > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: multi-env-deploy
          image: ${{ steps.login-ecr.outputs.registry }}/multi-env-deploy:${{ inputs.image_tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: multi-env-deploy-${{ inputs.environment }}
          cluster: multi-env-deploy
          wait-for-service-stability: false

      - name: Smoke test
        run: |
          echo "Waiting for service to stabilize..."
          sleep 30

          RUNNING=$(aws ecs describe-services \
            --cluster multi-env-deploy \
            --services multi-env-deploy-${{ inputs.environment }} \###
            --query 'services[0].runningCount' \
            --output text)

          echo "Running task count: $RUNNING"

          if [ "$RUNNING" -lt "1" ]; then
            echo "No running tasks — deployment failed"
            exit 1
          fi

          echo "Smoke test passed — $RUNNING task(s) running in ${{ inputs.environment }}"