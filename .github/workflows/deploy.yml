name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
          --task-definition multi-env-deploy-${{ inputs.environment }} \
          --query taskDefinition \
          > task-definition.json
      
      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: multi-env-deploy
          image: ${{ steps.login-ecr.outputs.registry }}/multi-env-deploy:${{ inputs.image_tag }}
          
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: multi-env-deploy-${{ inputs.environment }}
          cluster: multi-env-deploy
          wait-for-service-stability: true
      
      - name: Smoke test
        run: |
          echo "Waiting for service to stabilize..."
          sleep 30

          TASK_ARN=$(aws ecs list-tasks \
            --cluster multi-env-deploy \
            --service-name multi-env-deploy-${{ inputs.environment }} \
            --query 'taskArns[0]' \
            --output text)

          TASK_DETAILS=$(aws ecs describe-tasks \
            --cluster multi-env-deploy \
            --tasks $TASK_ARN)

          ENI_ID=$(echo $TASK_DETAILS | \
            python3 -c "import json,sys; attachments=json.load(sys.stdin)['tasks'][0]['attachments'][0]['details']; print(next(x['value'] for x in attachments if x['name']=='networkInterfaceId'))")

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids $ENI_ID \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text)

          echo "App running at $PUBLIC_IP:5000"

          curl --retry 5 --retry-delay 5 --fail \
            http://$PUBLIC_IP:5000/health